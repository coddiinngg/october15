<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My-Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section class="container">
    <section class="title">
      <div class="title-name">Movie <i class="fa-regular fa-comments"></i> Mate</div>
      <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-user"></i>
      </div>
    </section>

    <section id="menus">
      <div>인기</div>
      <div>액션</div>
      <div>미스터리</div>
      <div>드라마</div>
      <div>범죄</div>
      <div>코메디</div>
      <div>스릴러</div>
      <div>멜로</div>
      <div>공포 </div>
      <div>판타지</div>
      <div>SF</div>
      <div>전쟁</div>
      <div>사극</div>
      <div>가족</div>
    </section>

    <section class="movie-board row">
      <section class="movie-slide col-lg-4">
        <h2>상영중인 영화</h2>
        <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </section>

      <section class="movies col-lg-8">
        <h2 id="genre-name" class="movies-search"><div id="genre-section"><i class="fa-solid fa-magnifying-glass-arrow-right"></i> <input
          class="movie-year" type="text" placeholder="2024"> 년 <input class="movie-month" type="text"
          placeholder="10">월 <input class="movie-day" type="text" placeholder="4">주차 인기 영화</div></h2>
        <div id="movies-board" class="row">
        </div>
        <div>
        </div>
      </section>

    </section>

    <div class="modal" id="movie-modal" style="display: none;">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="movie-details">
        <h2 id="modal-title"></h2>
        <p id="modal-details"></p>
        </div>
      </div>
    </div>
    
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="main.js"></script>
</body>

</html>
